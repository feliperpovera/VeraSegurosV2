<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Mulish:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
@media (max-width:760px){
  #dc-root header > div{padding:8px 16px !important}
  #dc-root header nav{display:none !important}
  #dc-root header img{height:84px !important;width:84px !important}
}
</style>
<style>#dc-root, #dc-root *{font-family:'Mulish',sans-serif}</style>
</helmet>
<header style="position:sticky;top:0;z-index:50;background:rgba(255,255,255,0.88);backdrop-filter:blur(12px);border-bottom:1px solid #E7ECF6;font-family:'Mulish',sans-serif">
  <div style="max-width:1200px;margin:0 auto;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;gap:24px">
    <a href="Inicio.dc.html" style="display:flex;align-items:center;text-decoration:none">
      <img src="assets/logo-vera.jpg" alt="Vera Seguros — agencia de seguros en Medellín" style="height:120px;width:120px;object-fit:contain;border-radius:18px"/>
    </a>
    <nav style="display:flex;align-items:center;gap:30px">
      <div style="display:flex;flex-direction:column;align-items:center;gap:3px">
        <a href="Inicio.dc.html" style="text-decoration:none;color:#1A2230;font-weight:600;font-size:15px">Inicio</a>
        <sc-if value="{{ isInicio }}" hint-placeholder-val="{{ false }}"><span style="display:block;height:2px;width:100%;background:#2E4575;border-radius:2px"></span></sc-if>
      </div>
      <div style="display:flex;flex-direction:column;align-items:center;gap:3px">
        <a href="Seguros.dc.html" style="text-decoration:none;color:#1A2230;font-weight:600;font-size:15px">Seguros</a>
        <sc-if value="{{ isSeguros }}" hint-placeholder-val="{{ false }}"><span style="display:block;height:2px;width:100%;background:#2E4575;border-radius:2px"></span></sc-if>
      </div>
      <div style="display:flex;flex-direction:column;align-items:center;gap:3px">
        <a href="Companias.dc.html" style="text-decoration:none;color:#1A2230;font-weight:600;font-size:15px">Compañías</a>
        <sc-if value="{{ isCompanias }}" hint-placeholder-val="{{ false }}"><span style="display:block;height:2px;width:100%;background:#2E4575;border-radius:2px"></span></sc-if>
      </div>
      <div style="display:flex;flex-direction:column;align-items:center;gap:3px">
        <a href="Nosotros.dc.html" style="text-decoration:none;color:#1A2230;font-weight:600;font-size:15px">Nosotros</a>
        <sc-if value="{{ isNosotros }}" hint-placeholder-val="{{ false }}"><span style="display:block;height:2px;width:100%;background:#2E4575;border-radius:2px"></span></sc-if>
      </div>
    </nav>
    <a href="{{ waLink }}" target="_blank" style="display:flex;align-items:center;gap:8px;background:#25D366;color:#fff;text-decoration:none;font-weight:600;font-size:15px;padding:11px 18px;border-radius:999px;box-shadow:0 6px 18px rgba(37,211,102,0.28)" style-hover="transform:translateY(-1px)">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="#fff"><path d="M12.04 2C6.58 2 2.13 6.45 2.13 11.91c0 1.75.46 3.45 1.32 4.95L2 22l5.25-1.38c1.45.79 3.08 1.21 4.79 1.21h.01c5.46 0 9.91-4.45 9.91-9.91C21.96 6.45 17.5 2 12.04 2zm5.8 14.03c-.24.68-1.42 1.31-1.96 1.36-.5.05-.96.24-3.23-.67-2.73-1.08-4.45-3.86-4.58-4.04-.13-.18-1.1-1.46-1.1-2.79 0-1.33.7-1.98.94-2.25.24-.27.53-.34.71-.34.18 0 .35.002.51.01.16.007.38-.06.6.46.24.56.79 1.94.86 2.08.07.14.12.31.02.49-.09.18-.14.29-.28.45-.14.16-.29.36-.42.48-.14.14-.28.28-.12.55.16.27.71 1.17 1.53 1.9 1.05.94 1.94 1.23 2.21 1.36.27.14.43.12.59-.07.16-.18.68-.79.86-1.07.18-.27.36-.22.6-.13.25.09 1.58.75 1.85.88.27.14.45.21.51.32.07.11.07.63-.17 1.31z"/></svg>
      Cotizar
    </a>
  </div>
</header>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1200,&quot;height&quot;:76},&quot;active&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;inicio&quot;,&quot;seguros&quot;,&quot;companias&quot;,&quot;nosotros&quot;],&quot;default&quot;:&quot;inicio&quot;,&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  renderVals() {
    const a = this.props.active || '';
    return {
      waLink: 'https://wa.me/573156705627?text=' + encodeURIComponent('Hola Vera Seguros, quiero cotizar un seguro.'),
      isInicio: a === 'inicio',
      isSeguros: a === 'seguros',
      isCompanias: a === 'companias',
      isNosotros: a === 'nosotros',
    };
  }
}
</script>
</body>
</html>
